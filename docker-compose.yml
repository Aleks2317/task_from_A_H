services:
  postgres:
    image: postgres:14
    container_name: postgres_task_A_H
    environment:
      POSTGRES_USER: db_user
      POSTGRES_PASSWORD: "123"
      POSTGRES_DB: mock_db
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data/pgdata
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    command: >
      postgres -c max_connections=100
               -c shared_buffers=128MB
               -c effective_cache_size=384MB
               -c maintenance_work_mem=32MB
               -c checkpoint_completion_target=0.7
               -c wal_buffers=4MB
    healthcheck:

      test: [ "CMD-SHELL", "pg_isready -U db_user -d mock_db" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
    driver: local